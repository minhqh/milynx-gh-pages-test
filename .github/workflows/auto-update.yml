name: Auto Update Data and Trigger Pages

on:
  schedule:
    - cron: '0 0 * * *' # Chạy tự động vào lúc 0:00 UTC mỗi ngày
  workflow_dispatch: # Bật tính năng để bạn có thể bấm nút "Run workflow" test thủ công

jobs:
  update-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền để Action có thể commit code ngược lại repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run update script
        run: python update.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git commit -m "Auto-update data.json via GitHub Actions" || echo "No changes to commit"
          git push