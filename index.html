<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily AI Fact</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 500px; }
        .author { color: #666; font-size: 0.9em; margin-top: 1rem; font-style: italic; }
        .timestamp { font-size: 0.8em; color: #999; margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>💡 Today's Fact</h2>
        <p id="fact-text">Loading...</p>
        <div class="author" id="author-text"></div>
        <div class="timestamp" id="time-text"></div>
    </div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('fact-text').innerText = data.fact;
                document.getElementById('author-text').innerText = "- " + data.author + " -";
                document.getElementById('time-text').innerText = "Last updated: " + data.last_updated;
            });
    </script>
</body>
</html>
